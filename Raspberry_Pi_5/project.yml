---
import:
  - project-raspberrypi-default.yml
project:
  name: "rpi5-example-project"
  socks_version: "0.0.post1.dev295"
  rpi_model: "RPi_5"
external_tools:
  container_tool: "docker"
blocks:
  kernel:
    project:
      defconfig_target: "bcm2712_defconfig"
      build_srcs:
        branch: "rpi-6.12.y"
  rootfs:
    source: "build"
    builder: "RaspberryPi_Debian_RootFS_Builder"
    project:
      release: "trixie"
      mirror: "http://ftp.de.debian.org/debian/"
      addl_pkgs: ["sudo", "python3", "busybox", "device-tree-compiler", "network-manager", "systemd-timesyncd", "openssh-server", "nano", "vim"]
      users:
        - name: "root"
          pw_hash: "$6$vZIHKtcF/ibXBtIg$8hD7jbElXZVHNBhUIL4G97lqgsZ.7hq1YtjwdZpG.YRwqFy9kWwACLgf4hEFbXQYr81X08B2EJIDSKO3ZeBF4/" # debian
        - name: "rpi"
          pw_hash: "$6$jOf/Aizd9FtXL8S0$4ytgBLOSvD85o6dEHzMHUW8381LdHtIzbVyaG5emUC0dcjodBNpZKmdX1VvWtMho5bEU02cj7X.ckdmu6zUvo1" # rpi5
          groups: ["sudo", "dialout"]
      add_build_info: true
      dependencies:
        kernel: "temp/kernel/output/bp_kernel_*.tar.gz"
    container:
      image: "debian-rootfs-builder-debian13"
      tag: "socks"
  image:
    project:
      size_boot_partition: 500
      size_rootfs_partition: 2000
      dependencies:
        rootfs: "temp/rootfs/output/bp_rootfs_*.tar.gz"
