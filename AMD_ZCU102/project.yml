---
import:
  - project-zynqmp-default.yml
project:
  name: "zcu102-example-project"
  socks_version: "0.0.post1.dev295"
external_tools:
  xilinx:
    version: "2024.2"
blocks:
  vivado:
    builder: "ZynqMP_AMD_Vivado_Hog_Builder"
    project:
      build_srcs:
        source: "ssh://git@github.com/mffuchs/ZCU102-SoCks-vivado-test-project.git"
        branch: "main"
      name: "zcu102-socks-vivado-test-project"
    container:
      image: "amd-xilinx-tools-alma9"
      tag: "socks"
  image:
    project:
      dependencies:
        rootfs: "temp/rootfs/output/bp_rootfs_*.tar.gz"
  rootfs:
    source: "build"
    builder: "ZynqMP_Debian_RootFS_Builder"
    project:
      release: "trixie"
      mirror: "http://ftp.ch.debian.org/debian/"
      addl_pkgs: ["sudo", "python3", "busybox", "device-tree-compiler", "network-manager", "systemd-timesyncd", "openssh-server", "nano", "vim"]
      users:
        - name: "root"
          pw_hash: "$6$vZIHKtcF/ibXBtIg$8hD7jbElXZVHNBhUIL4G97lqgsZ.7hq1YtjwdZpG.YRwqFy9kWwACLgf4hEFbXQYr81X08B2EJIDSKO3ZeBF4/" # debian
        - name: "zcu102"
          pw_hash: "$6$9GG59oRuX7htsjJ1$spOlEsmJ.0PMAtEhEfggV5gaKe2BN3ClPBTIh37bqxMc4BgDjqeYjJrWjrL5X8IJetdhJeZbr1T5YFzG9cDrE/" # zcu102
          groups: ["sudo", "dialout"]
      add_build_info: true
      dependencies:
        kernel: "temp/kernel/output/bp_kernel_*.tar.gz"
    container:
      image: "debian-rootfs-builder-debian13"
      tag: "socks"
  fsbl:
    project:
      patches:
        - 0001-Add-gitignore.patch
  pmu_fw:
    project:
      patches:
        - 0001-Add-gitignore.patch
  kernel:
    project:
      config_snippets:
        - disable-building-with-debug-info-to-reduce-size.cfg
  ssbl:
    project:
      patches:
        - 0001-Add-directory-with-generated-files-to-gitignore.patch
      config_snippets:
        - Disable-mkeficapsule.cfg
  devicetree:
    project:
      dt_includes:
        - system-user.dtsi
      board: "zcu102-revb"
